name: Deploy webapp

on:
  push:
    branches: [main]
    paths: ['webapp/**', '.github/workflows/deploy-webapp.yml']
  workflow_dispatch:

concurrency:
  group: webapp-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-workers
      url: https://app.osprey.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci
        working-directory: webapp
      # webapp's cross-repo parity tests (zone-parity.test.ts, fitness-load-parity.test.ts,
      # hyrox-loads.test.ts) import OSPREY-app/src files by relative path. Vite/tsc resolve
      # the nearest tsconfig.json for any file it transforms, which for those files is
      # OSPREY-app/tsconfig.json — and that extends "expo/tsconfig.base", resolvable only
      # once OSPREY-app's own node_modules exist. Without this, typecheck/test fail with
      # "TSConfckParseError: failed to resolve extends: expo/tsconfig.base".
      - name: Cache OSPREY-app dependencies
        id: osprey-app-cache
        uses: actions/cache@v4
        with:
          path: OSPREY-app/node_modules
          key: osprey-app-node-modules-${{ hashFiles('OSPREY-app/package-lock.json') }}
      - name: Install OSPREY-app dependencies
        if: steps.osprey-app-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: OSPREY-app
      - run: npm run typecheck
        working-directory: webapp
      - run: npm test
        working-directory: webapp
        env:
          # src/lib/supabase.ts calls createClient() at module load time, so any test
          # that transitively imports it (chat-send.test.ts, etc.) needs real values here
          # even though the test itself never touches the network.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - run: npm run build
        working-directory: webapp
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: webapp
          command: deploy
          wranglerVersion: '4'
